<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Red Projects</title>
  <style>
    :root {
      --accent: #ff2d2d;
      --accent-soft: rgba(255, 45, 45, 0.2);
      --bg: #080808;
      --text: #fff6f6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #7f1d1d, #ef4444, #b91c1c);
      background-size: 300% 300%;
      animation: bgMove 8s ease infinite;
      color: var(--text);
      overflow: hidden;
      padding: 24px;
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      animation: orbit 10s ease-in-out infinite;
    }

    body::before {
      width: 280px;
      height: 280px;
      background: #ff7a7a;
      top: 8%;
      left: 10%;
    }

    body::after {
      width: 320px;
      height: 320px;
      background: #ff1f1f;
      bottom: 5%;
      right: 8%;
      animation-direction: reverse;
    }

    .glow {
      position: fixed;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 80, 80, 0.35), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
      transition: transform 0.1s ease-out;
    }

    .card {
      position: relative;
      width: min(92vw, 640px);
      padding: 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      z-index: 1;
    }

    h1 {
      font-size: 3rem;
      margin: 0 0 10px;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(255, 45, 45, 0.5);
      transform: translateY(8px);
      opacity: 0;
      animation: fadeUp 0.8s ease-out forwards;
    }

    p {
      font-size: 1.15rem;
      margin: 0 0 20px;
      opacity: 0.9;
      transform: translateY(8px);
      opacity: 0;
      animation: fadeUp 0.9s ease-out 0.15s forwards;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    li {
      opacity: 0;
      transform: translateX(-40px);
      animation: slideIn 0.8s ease-out forwards;
    }

    li:nth-child(1) { animation-delay: 0.2s; }
    li:nth-child(2) { animation-delay: 0.35s; }
    li:nth-child(3) { animation-delay: 0.5s; }

    a {
      display: inline-block;
      width: 100%;
      padding: 14px 16px;
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      font-weight: bold;
      background: linear-gradient(90deg, var(--accent-soft), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    a:hover {
      transform: translateX(6px) scale(1.02);
      box-shadow: 0 8px 20px rgba(255, 45, 45, 0.2);
      background: linear-gradient(90deg, rgba(255,45,45,0.35), rgba(255,255,255,0.13));
    }

    .status {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #ffb3b3;
      opacity: 0.8;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes orbit {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <h1>My Projects</h1>
    <p>Open one of the folders below and explore the experience.</p>
    <ul>
      <li><a href="web/">Go to web</a></li>
      <li><a href="web2/">Go to web2</a></li>
      <li><a href="index.html">Back to home</a></li>
    </ul>
    <div class="status" id="status">Dynamic red mode is active.</div>
  </div>

  <script>
    const root = document.documentElement;
    const glow = document.querySelector('.glow');
    const status = document.getElementById('status');

    function updateAccent() {
      const time = Date.now() / 400;
      const hue = 0 + (Math.sin(time) + 1) * 8;
      const sat = 85;
      const light = 55;
      const color = `hsl(${hue}, ${sat}%, ${light}%)`;
      root.style.setProperty('--accent', color);
      root.style.setProperty('--accent-soft', `${color}33`);
    }

    window.addEventListener('mousemove', (e) => {
      glow.style.left = `${e.clientX}px`;
      glow.style.top = `${e.clientY}px`;
      const intensity = 1 + Math.sin(Date.now() / 220) * 0.15;
      glow.style.transform = `translate(-50%, -50%) scale(${intensity})`;
    });

    setInterval(() => {
      updateAccent();
    }, 60);

    updateAccent();

    document.querySelectorAll('a').forEach((link) => {
      link.addEventListener('mouseenter', () => {
        status.textContent = `Opening ${link.textContent.trim()}...`;
      });
      link.addEventListener('mouseleave', () => {
        status.textContent = 'Dynamic red mode is active.';
      });
    });
  </script>
</body>
</html>
