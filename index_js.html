<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Demo</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #f8fafc;
      font-family: Arial, sans-serif;
      padding: 24px;
      overflow: hidden;
    }

    .card {
      width: min(90vw, 620px);
      padding: 32px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 20px 44px rgba(0,0,0,0.35);
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.5rem;
      color: #38bdf8;
    }

    p {
      margin: 0 0 20px;
      line-height: 1.6;
      color: #e2e8f0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    a {
      display: inline-block;
      width: 100%;
      padding: 12px 16px;
      border-radius: 999px;
      background: #38bdf8;
      color: white;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.25);
    }

    .status {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>JavaScript Showcase</h1>
    <p>This page uses JavaScript to make the experience feel more alive.</p>
    <ul>
      <li><a href="web/">Open web</a></li>
      <li><a href="web2/">Open web2</a></li>
      <li><a href="index.html">Back to home</a></li>
    </ul>
    <div class="status" id="status">Move your mouse over the links.</div>
  </div>

  <script>
    const links = document.querySelectorAll('a');
    const status = document.getElementById('status');

    links.forEach((link) => {
      link.addEventListener('mouseenter', () => {
        status.textContent = `You are hovering ${link.textContent.trim()}`;
      });

      link.addEventListener('mouseleave', () => {
        status.textContent = 'Move your mouse over the links.';
      });
    });
  </script>
</body>
</html>
